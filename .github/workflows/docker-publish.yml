name: Build & Publish Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    name: Build Rust Binary (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone Azalea Dependency
      run: |
        git clone --depth 1 https://github.com/azalea-rs/azalea.git azalea-main

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
        targets: ${{ matrix.target }}

    - name: Install Musl Tools (x86_64)
      if: matrix.target == 'x86_64-unknown-linux-musl'
      run: |
        sudo apt-get update
        sudo apt-get install -y musl-tools

    - name: Install Musl Cross Toolchain (aarch64)
      if: matrix.target == 'aarch64-unknown-linux-musl'
      run: |
        musl_arch="aarch64-linux-musl-cross"
        curl -L "https://musl.cc/${musl_arch}.tgz" -o "${musl_arch}.tgz"
        tar -xzf "${musl_arch}.tgz"
        echo "$(pwd)/${musl_arch}/bin" >> $GITHUB_PATH

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Build Release Binary
      env:
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-musl' && 'aarch64-linux-musl-gcc' || '' }}
        CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: ${{ matrix.target == 'x86_64-unknown-linux-musl' && 'musl-gcc' || '' }}
      run: |
        cargo build --release --target ${{ matrix.target }}

    - name: Prepare Artifact
      run: |
        mkdir -p bin
        cp target/${{ matrix.target }}/release/azalea_bot bin/azalea_bot_${{ matrix.arch }}

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: azalea_bot-${{ matrix.arch }}
        path: bin/azalea_bot_${{ matrix.arch }}
        if-no-files-found: error

  publish-docker:
    name: Package and Push Multi-Arch Image
    needs: build-rust
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: bin-temp
        merge-multiple: true

    - name: Move binaries to correct folder
      run: |
        mkdir -p bin
        mv bin-temp/azalea_bot_* bin/
        ls -lah bin/

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract Docker metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.ci
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
