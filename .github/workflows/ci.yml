name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.job.target }}
    runs-on: ${{ matrix.job.os }}
    strategy:
      fail-fast: false
      matrix:
        job:
          # Windows x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          # Windows ARM64 (aarch64)
          - os: windows-latest
            target: aarch64-pc-windows-msvc
          # Linux x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # Linux ARM64 (aarch64)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # macOS ARM64
          - os: macos-latest
            target: aarch64-apple-darwin

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone Azalea Dependency
      run: |
        git clone --depth 1 https://github.com/azalea-rs/azalea.git azalea-main

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly
        targets: ${{ matrix.job.target }}

    - name: Install Cross-Compilation Toolchain (Linux ARM64)
      if: matrix.job.target == 'aarch64-unknown-linux-gnu'
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

    - name: Rust Cache
      uses: swatinem/rust-cache@v2
      with:
        key: ${{ matrix.job.target }}

    - name: Build (Release Mode for Extreme Optimization)
      env:
        # 为 Linux ARM64 交叉编译设置链接器
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.job.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}
      run: |
        cargo build --release --target ${{ matrix.job.target }}

    - name: Test (Only run tests on native runners)
      # 排除非原生运行的交叉编译目标（如 Windows ARM64 运行在 x64 runner 上）
      # ubuntu-latest 可以运行 x86_64 测试，macos-latest(M1) 可以运行 aarch64 测试，windows-latest 可以运行 x86_64 测试
      if: |
        matrix.job.target == 'x86_64-unknown-linux-gnu' ||
        matrix.job.target == 'x86_64-pc-windows-msvc' ||
        matrix.job.target == 'aarch64-apple-darwin'
      run: |
        cargo test --release --target ${{ matrix.job.target }}
